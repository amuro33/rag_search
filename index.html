<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>RAG 검색 평가 — api_registry</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #f4f6f8;
    --panel: #ffffff;
    --panel-2: #fafbfc;
    --line: #e3e7ec;
    --line-2: #eef1f4;
    --ink: #1b2027;
    --ink-2: #5a6472;
    --ink-3: #8a929e;
    --accent: #3a5ccc;
    --accent-soft: #eaeffc;
    --primary: #1a1d23;
    --primary-hover: #2c313a;
    --pass: #1c7a4a;
    --pass-bg: #edf5ef;
    --pass-line: #cfe6d6;
    --warn: #8a6a1c;
    --warn-bg: #f5efe1;
    --mid: #a4571f;
    --mid-bg: #f5ebe0;
    --fail: #b23a3a;
    --fail-bg: #f6eaea;
    --idle: #9aa3af;
    --idle-bg: #f0f2f5;
    --mono: 'IBM Plex Mono', ui-monospace, SFMono-Regular, Menlo, monospace;
    --sans: 'IBM Plex Sans KR', system-ui, -apple-system, sans-serif;
    --radius: 8px;
    --shadow: 0 1px 2px rgba(20,28,40,.05), 0 1px 1px rgba(20,28,40,.04);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--ink);
    font-size: 13px;
    line-height: 1.45;
    -webkit-font-smoothing: antialiased;
  }
  .app { display: flex; flex-direction: column; min-height: 100vh; }

  /* ---- top bar ---- */
  .topbar {
    display: flex; align-items: center; gap: 14px;
    padding: 12px 22px; background: var(--panel);
    border-bottom: 1px solid var(--line);
    position: sticky; top: 0; z-index: 30;
  }
  .topbar .mark { width: 24px; height: 24px; flex: none; color: var(--ink); }
  .topbar h1 { font-size: 14px; font-weight: 700; margin: 0; letter-spacing: -.2px; }
  .topbar .sub { color: var(--ink-3); font-size: 11.5px; font-family: var(--mono); }
  .topbar .spacer { flex: 1; }
  .pill {
    font-family: var(--mono); font-size: 11px; color: var(--ink-2);
    background: var(--panel-2); border: 1px solid var(--line);
    padding: 3px 9px; border-radius: 999px;
  }
  .pill b { color: var(--accent); font-weight: 600; }

  /* ---- dashboard ---- */
  .dash {
    display: grid; grid-template-columns: repeat(5, 1fr) 2.1fr;
    gap: 1px; background: var(--line-2);
    border-bottom: 1px solid var(--line);
  }
  .stat { background: var(--panel); padding: 12px 16px; }
  .stat .k { font-size: 10px; color: var(--ink-3); font-weight: 600; letter-spacing: .6px; text-transform: uppercase; }
  .stat .v { font-size: 22px; font-weight: 700; font-family: var(--mono); letter-spacing: -.5px; margin-top: 3px; font-variant-numeric: tabular-nums; }
  .stat .v small { font-size: 12px; color: var(--ink-3); font-weight: 500; }
  .stat .v.accent { color: var(--accent); }
  .stat .v.pass { color: var(--pass); }

  .dist { background: var(--panel); padding: 12px 16px; display: flex; flex-direction: column; gap: 7px; }
  .dist .k { font-size: 10px; color: var(--ink-3); font-weight: 600; letter-spacing: .6px; text-transform: uppercase; }
  .distbar { display: flex; height: 14px; border-radius: 4px; overflow: hidden; background: var(--idle-bg); }
  .distbar > span { display: block; transition: width .3s ease; }
  .seg3 { background: var(--pass); } .seg2 { background: var(--warn); }
  .seg1 { background: var(--mid); }  .seg0 { background: var(--fail); }
  .distlegend { display: flex; gap: 12px; flex-wrap: wrap; font-family: var(--mono); font-size: 10.5px; color: var(--ink-2); }
  .distlegend i { width: 8px; height: 8px; border-radius: 2px; display: inline-block; margin-right: 4px; vertical-align: middle; }

  /* ---- progress ---- */
  .progress { display: none; align-items: center; gap: 12px; padding: 9px 22px; background: var(--accent-soft); border-bottom: 1px solid #d6e3f7; }
  .progress.on { display: flex; }
  .progress .track { flex: 1; height: 6px; background: #cfe0f8; border-radius: 99px; overflow: hidden; }
  .progress .fill { height: 100%; width: 0; background: var(--accent); border-radius: 99px; transition: width .12s linear; }
  .progress .label { font-family: var(--mono); font-size: 11.5px; color: var(--accent); white-space: nowrap; }
  .progress .now { color: var(--ink-2); font-size: 11px; font-family: var(--mono); max-width: 320px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  /* ---- toolbar ---- */
  .toolbar { display: flex; align-items: center; gap: 10px; padding: 10px 22px; background: var(--panel); border-bottom: 1px solid var(--line); flex-wrap: wrap; position: sticky; top: 51px; z-index: 20; }
  .chips { display: flex; gap: 4px; background: var(--panel-2); padding: 3px; border-radius: 8px; border: 1px solid var(--line); }
  .chip { border: none; background: transparent; font-family: var(--sans); font-size: 12px; color: var(--ink-2); padding: 4px 11px; border-radius: 6px; cursor: pointer; white-space: nowrap; }
  .chip:hover { color: var(--ink); }
  .chip.on { background: var(--panel); color: var(--ink); box-shadow: var(--shadow); font-weight: 600; }
  .chip b { font-family: var(--mono); font-weight: 600; opacity: .65; margin-left: 4px; font-size: 11px; }
  .field { display: flex; align-items: center; gap: 6px; }
  input[type=text], select {
    font-family: var(--sans); font-size: 12.5px; color: var(--ink);
    border: 1px solid var(--line); background: var(--panel-2);
    border-radius: 7px; padding: 6px 9px; outline: none;
  }
  input[type=text] { width: 200px; }
  input[type=text]:focus, select:focus { border-color: var(--accent); background: #fff; }
  .toolbar .spacer { flex: 1; }
  .btn { font-family: var(--sans); font-size: 12.5px; font-weight: 600; border-radius: 7px; padding: 7px 13px; cursor: pointer; border: 1px solid var(--line); background: var(--panel); color: var(--ink); display: inline-flex; align-items: center; gap: 6px; }
  .btn:hover { background: var(--panel-2); }
  .btn.primary { background: var(--primary); border-color: var(--primary); color: #fff; }
  .btn.primary:hover { background: var(--primary-hover); border-color: var(--primary-hover); }
  .btn.primary:disabled { background: #c4c7cc; border-color: #c4c7cc; cursor: not-allowed; }
  .btn.danger { color: var(--fail); border-color: #eccdd2; }
  .btn.danger:hover { background: var(--fail-bg); }

  /* ---- table ---- */
  .tablewrap { flex: 1; overflow: auto; }
  table { width: 100%; border-collapse: collapse; }
  thead th {
    position: sticky; top: 0; z-index: 10; background: var(--panel-2);
    text-align: left; font-size: 10px; font-weight: 600; color: var(--ink-3);
    padding: 8px 12px; border-bottom: 1px solid var(--line); white-space: nowrap;
    letter-spacing: .6px; text-transform: uppercase;
  }
  tbody td { padding: 5px 12px; border-bottom: 1px solid var(--line-2); vertical-align: middle; }
  tbody tr.row:hover { background: #f8fafc; cursor: pointer; }
  tbody tr.row.sel { background: #f1f4fc; box-shadow: inset 2px 0 0 var(--accent); }
  tbody tr.row.sel:hover { background: #eaeffb; }
  .c-check { width: 34px; text-align: center; }
  .c-id { width: 270px; }
  .c-app { width: 96px; }
  .c-score { width: 116px; }
  .c-chev { width: 30px; text-align: center; color: var(--ink-3); }
  .qid { font-family: var(--mono); font-size: 12.5px; font-weight: 500; color: var(--ink); }
  .desc { color: var(--ink-2); font-size: 12px; }
  .apptag { font-size: 11px; color: var(--ink-2); background: var(--idle-bg); border: 1px solid var(--line); padding: 2px 7px; border-radius: 5px; white-space: nowrap; }
  input[type=checkbox] { width: 15px; height: 15px; accent-color: var(--accent); cursor: pointer; margin: 0; vertical-align: middle; }

  .score { font-family: var(--mono); font-weight: 600; font-size: 12px; padding: 3px 9px; border-radius: 999px; display: inline-flex; align-items: center; gap: 6px; font-variant-numeric: tabular-nums; }
  .score::before { content: ''; width: 7px; height: 7px; border-radius: 99px; }
  .score.s3 { color: var(--pass); background: var(--pass-bg); } .score.s3::before { background: var(--pass); }
  .score.s2 { color: var(--warn); background: var(--warn-bg); } .score.s2::before { background: var(--warn); }
  .score.s1 { color: var(--mid);  background: var(--mid-bg);  } .score.s1::before { background: var(--mid); }
  .score.s0 { color: var(--fail); background: var(--fail-bg); } .score.s0::before { background: var(--fail); }
  .score.idle { color: var(--idle); background: var(--idle-bg); } .score.idle::before { background: var(--idle); }
  .score.run { color: var(--accent); background: var(--accent-soft); } .score.run::before { background: var(--accent); animation: pulse 1s infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .3; } }
  .chev { transition: transform .15s ease; display: inline-block; }
  tr.row.open .chev { transform: rotate(90deg); }

  /* ---- detail ---- */
  tr.detail > td { padding: 0; background: var(--panel-2); border-bottom: 1px solid var(--line); }
  .detail-inner { padding: 6px 14px 14px 50px; display: flex; flex-direction: column; gap: 8px; }
  .qcard { background: var(--panel); border: 1px solid var(--line); border-radius: var(--radius); overflow: hidden; }
  .qhead { display: flex; align-items: center; gap: 10px; padding: 9px 13px; border-bottom: 1px solid var(--line-2); }
  .qtag { font-family: var(--mono); font-size: 11px; font-weight: 600; color: var(--ink-3); flex: none; }
  .qtext { flex: 1; color: var(--ink); font-size: 12.5px; }
  .verdict { font-family: var(--mono); font-size: 10.5px; font-weight: 600; padding: 3px 9px; border-radius: 999px; white-space: nowrap; flex: none; font-variant-numeric: tabular-nums; }
  .verdict.ok { color: var(--pass); background: var(--pass-bg); }
  .verdict.no { color: var(--fail); background: var(--fail-bg); }
  .reslist { padding: 4px 0; }
  .resrow { display: grid; grid-template-columns: 30px 1fr 84px; align-items: center; gap: 10px; padding: 5px 13px; font-size: 12px; }
  .resrow + .resrow { border-top: 1px solid var(--line-2); }
  .resrow.hit { background: var(--pass-bg); }
  .resrow.wrongtop { background: #fbf6ee; }
  .rank { font-family: var(--mono); font-size: 11px; color: var(--ink-3); text-align: center; font-variant-numeric: tabular-nums; }
  .resrow.hit .rank { color: var(--pass); font-weight: 600; }
  .resid { font-family: var(--mono); font-size: 12px; color: var(--ink); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .resid .meta { font-family: var(--sans); color: var(--ink-3); font-size: 10.5px; margin-left: 8px; }
  .resid .content-link { border: 0; background: transparent; color: inherit; cursor: pointer; padding: 0; font: inherit; text-align: left; }
  .resid .content-link:hover { color: var(--accent); text-decoration: underline; }
  .resrow.hit .resid { color: var(--pass); font-weight: 600; }
  .sim { font-family: var(--mono); font-size: 11.5px; color: var(--ink-2); text-align: right; font-variant-numeric: tabular-nums; }
  .empty { padding: 60px; text-align: center; color: var(--ink-3); font-size: 13px; }
  .skel { padding: 40px; text-align: center; color: var(--ink-3); font-family: var(--mono); font-size: 12px; }

  tr.morerow td { padding: 12px; text-align: center; background: var(--panel-2); border-bottom: 1px solid var(--line); }
  .morebtn { font-family: var(--sans); font-size: 12.5px; font-weight: 600; color: var(--accent); background: var(--panel); border: 1px solid var(--line); border-radius: 7px; padding: 7px 16px; cursor: pointer; }
  .morebtn:hover { background: var(--accent-soft); border-color: #c3d4f3; }
  .morehint { display: block; margin-top: 7px; font-size: 11px; color: var(--ink-3); font-family: var(--mono); }

  .modal { display: none; position: fixed; inset: 0; z-index: 60; background: rgba(20,28,40,.28); align-items: center; justify-content: center; padding: 24px; }
  .modal.on { display: flex; }
  .modal-card { width: min(720px, 100%); max-height: min(680px, 90vh); background: var(--panel); border: 1px solid var(--line); border-radius: var(--radius); box-shadow: 0 18px 50px rgba(20,28,40,.18); display: flex; flex-direction: column; }
  .modal-head { display: flex; align-items: center; gap: 10px; padding: 12px 14px; border-bottom: 1px solid var(--line); }
  .modal-title { flex: 1; font-family: var(--mono); font-size: 12px; font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .modal-actions { display: flex; gap: 6px; }
  .modal-body { padding: 14px; overflow: auto; }
  .modal-pre { margin: 0; font-family: var(--sans); font-size: 12.5px; color: var(--ink); white-space: pre-wrap; line-height: 1.55; }
</style>
</head>
<body>
<div class="app">
  <header class="topbar">
    <svg class="mark" viewBox="0 0 24 24" fill="none" aria-hidden="true">
      <circle cx="5" cy="5" r="1.6" fill="currentColor" opacity=".35"/>
      <circle cx="12" cy="5" r="1.6" fill="currentColor" opacity=".55"/>
      <circle cx="19" cy="5" r="1.6" fill="currentColor" opacity=".35"/>
      <circle cx="5" cy="12" r="1.6" fill="currentColor" opacity=".55"/>
      <circle cx="12" cy="12" r="2.7" fill="currentColor"/>
      <circle cx="19" cy="12" r="1.6" fill="currentColor" opacity=".55"/>
      <circle cx="5" cy="19" r="1.6" fill="currentColor" opacity=".35"/>
      <circle cx="12" cy="19" r="1.6" fill="currentColor" opacity=".55"/>
      <circle cx="19" cy="19" r="1.6" fill="currentColor" opacity=".35"/>
    </svg>
    <div>
      <h1>RAG 검색 평가</h1>
      <div class="sub">api_registry · pgvector · bge-m3 (1024d)</div>
    </div>
    <span class="pill" id="envPill">search_pg_vector</span>
    <div class="spacer"></div>
    <span class="pill">채점 기준 <b id="topkPill">top-3</b></span>
  </header>

  <section class="dash" id="dash"></section>

  <div class="progress" id="progress">
    <span class="label" id="progLabel">측정 중</span>
    <div class="track"><div class="fill" id="progFill"></div></div>
    <span class="now" id="progNow"></span>
    <button class="btn danger" id="cancelBtn" style="padding:4px 10px;">중지</button>
  </div>

  <div class="toolbar">
    <div class="field">
      <input type="checkbox" id="selAll" title="현재 목록 전체 선택" />
      <label for="selAll" style="font-size:12px;color:var(--ink-2);cursor:pointer;">전체</label>
    </div>
    <div class="chips" id="chips"></div>
    <div class="field">
      <select id="appFilter"><option value="">app 전체</option></select>
    </div>
    <input type="text" id="search" placeholder="query_id · description · author 검색" />
    <div class="spacer"></div>
    <button class="btn" id="saveResultsBtn">결과 저장</button>
    <button class="btn" id="loadResultsBtn">결과 불러오기</button>
    <button class="btn danger" id="clearResultsBtn">결과 초기화</button>
    <button class="btn" id="clearSelBtn">선택 해제</button>
    <button class="btn" id="runAllBtn">전체 측정</button>
    <button class="btn primary" id="runSelBtn">선택 측정 (0)</button>
    <input type="file" id="loadResultsFile" accept="application/json,.json" hidden />
  </div>

  <div class="tablewrap">
    <table>
      <thead>
        <tr>
          <th class="c-check"></th>
          <th class="c-id">query_id</th>
          <th>description</th>
          <th class="c-app">app</th>
          <th class="c-score">점수</th>
          <th class="c-chev"></th>
        </tr>
      </thead>
      <tbody id="tbody">
        <tr><td colspan="6" class="skel">api_registry 불러오는 중…</td></tr>
      </tbody>
    </table>
  </div>
</div>

<div class="modal" id="contentModal" aria-hidden="true">
  <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="contentModalTitle">
    <div class="modal-head">
      <div class="modal-title" id="contentModalTitle">content</div>
      <div class="modal-actions">
        <button class="btn" id="copyContentBtn" style="padding:5px 10px;">복사</button>
        <button class="btn" id="closeContentBtn" style="padding:5px 10px;">닫기</button>
      </div>
    </div>
    <div class="modal-body">
      <pre class="modal-pre" id="contentModalPre"></pre>
    </div>
  </div>
</div>

<script src="data-adapter.js"></script>
<script src="app.js"></script>
</body>
</html>
